<head>
  <meta charset="UTF-8">

  <meta name="description" content="創作活動や推し活に大活躍！画像を自由に配置して線で繋ぐだけで、オリキャラや推しの関係性がひと目でわかる人物相関図を無料で作成できるツールです♡">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- OGP -->
  <meta property="og:title" content="オリキャラ相関図メーカー">
  <meta property="og:description" content="うちの子の関係性を可視化！自由に配置して繋げる相関図ツール♡">

  <!-- フォント・アイコン -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 分割したCSSを読み込む -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🧩 オリキャラ相関図メーカー</h1>

  <!-- 使い方ガイド（アコーディオン風にしても可愛いかも！） -->
  <div class="guide-box">
    <p>💡 <strong>使い方ガイド</strong></p>
    <ul>
      <li>👤 <strong>1回タップ</strong>：キャラを選択（サイズ変更できるよ）</li>
      <li>🔤 <strong>ダブルタップ</strong>：キャラの名前を変更！</li>
      <li>👆 <strong>ボードの余白</strong>をスワイプで画面スクロール</li>
    </ul>
  </div>

  <div class="controls">
    <label class="file-label">
      <input type="file" id="fileInput" accept="image/*">
      <i class="fa-solid fa-plus"></i> キャラ追加
    </label>

    <button class="btn btn-line" id="lineModeBtn">
      <i class="fa-solid fa-link"></i> 関係を結ぶ
    </button>

    <div class="control-group">
      <i class="fa-solid fa-up-right-and-down-left-from-center" style="font-size:0.8rem; color:#888;"></i>
      <input type="range" id="sizeSlider" min="50" max="200" value="80" disabled>
    </div>

    <div class="control-group" style="font-size:0.8rem;">
      背景
      <input type="color" id="bgColorPicker" value="#ffffff" class="color-picker-small">
    </div>

    <button class="btn btn-reset" id="resetBtn"><i class="fa-solid fa-trash"></i></button>
  </div>

  <!-- 相関図ボード -->
  <div id="boardContainer">
    <svg id="linesSvg"><defs></defs></svg>
  </div>

  <div class="save-share-area">
    <button class="btn btn-add" id="btn-save">
      <i class="fa-solid fa-camera"></i> 画像保存
    </button>
    <button class="btn" style="background:#555;" id="btn-share">
      <i class="fa-solid fa-share-nodes"></i> 共有
    </button>
  </div>
  <div id="longpressSaveArea"></div>

  <!-- 👇 モーダル群 👇 -->

  <!-- 関係入力・編集モーダル (修正!) -->
  <div id="relationModal" class="modal-overlay">
    <div class="modal-content">
      <h3 id="relationModalTitle">関係性を入力 🔗</h3>
      <input type="text" id="relationText" class="modal-input" placeholder="例：親友、ライバル">
      <div class="preset-btns">
        <button class="preset-btn" data-text="親友">親友</button>
        <button class="preset-btn" data-text="恋人">恋人</button>
        <button class="preset-btn" data-text="犬猿">犬猿</button>
        <button class="preset-btn" data-text="家族">家族</button>
        <button class="preset-btn" data-text="片思い">片思い</button>
      </div>
      <div class="checkbox-wrapper">
        <input type="checkbox" id="arrowCheck">
        <label for="arrowCheck">矢印をつける (一方通行)</label>
      </div>
      <label style="font-size:0.9rem; font-weight:bold;">線の色：</label>
      <input type="color" id="lineColorInput" value="#ffb7c5" class="color-picker-large">
      <div class="modal-actions">
        <button class="btn btn-add" id="confirmRelationBtn">決定</button>
        <!-- 👇 削除ボタンを追加！ -->
        <button class="btn btn-danger" id="deleteRelationBtn" style="display:none;">削除</button>
        <button class="btn btn-reset" id="cancelRelationBtn">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 名前変更モーダル（NEW!） -->
  <div id="nameModal" class="modal-overlay">
    <div class="modal-content">
      <h3>名前を変更 🔤</h3>
      <input type="text" id="nameInput" class="modal-input" placeholder="キャラの名前">
      <div class="modal-actions">
        <button class="btn btn-add" id="confirmNameBtn">決定</button>
        <button class="btn btn-reset" id="cancelNameBtn">キャンセル</button>
      </div>
    </div>
  </div>
  <!-- 確認用モーダル (NEW!) -->
  <div id="confirmModal" class="modal-overlay" style="z-index: 200;">
    <div class="modal-content" style="max-width: 280px;">
      <h3 style="color:#ff6b6b;"><i class="fa-solid fa-triangle-exclamation"></i> 確認</h3>
      <p id="confirmMessage" style="font-weight:bold; color:#555; margin-bottom:20px;">本当に実行する？</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirmYesBtn">はい</button>
        <button class="btn btn-reset" id="confirmNoBtn">いいえ</button>
      </div>
    </div>
  </div>
  <!-- トースト通知用コンテナ（NEW!） -->
  <div id="toastContainer"></div>

  <!-- フッター -->
  <footer class="ad-footer">
    <p style="color:var(--theme-color); font-weight:bold; margin-bottom:10px;">♡ 創作のお供に ♡</p>
    <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">

    </div>
  </footer>

  <div class="footer-nav">
    <a href="https://mofu-mitsu.github.io/">TOPへ戻る</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
